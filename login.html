<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login Portal</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            background:linear-gradient(135deg,#0b1120,#1e3a8a);
        }

        .login-container{
            width:380px;
            background:#ffffff;
            padding:35px;
            border-radius:15px;
            box-shadow:0 8px 25px rgba(0,0,0,0.25);
        }

        .login-title{
            text-align:center;
            margin-bottom:25px;
            color:#1e3a8a;
        }

        .input-box{
            margin-bottom:18px;
        }

        .input-box label{
            display:block;
            margin-bottom:6px;
            font-size:14px;
            font-weight:600;
            color:#555;
        }

        .input-box input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
        }

        .input-box input:focus{
            border-color:#2563eb;
        }

        .login-btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        .login-btn:hover{
            background:#1d4ed8;
        }

        .register-link{
            text-align:center;
            margin-top:18px;
            font-size:14px;
        }

        .register-link a{
            text-decoration:none;
            color:#2563eb;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="login-container">

    <h2 class="login-title">Login Portal</h2>

    <form id="signinForm">

        <div class="input-box">
            <label for="userEmail">Email</label>
            <input type="email" id="userEmail" placeholder="Enter your email" required>
        </div>

        <div class="input-box">
            <label for="userPassword">Password</label>
            <input type="password" id="userPassword" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="login-btn">Sign In</button>

    </form>

    <div class="register-link">
        New User?
        <a href="/register.html">Create Account</a>
    </div>

</div>

<script>
document.getElementById("signinForm").addEventListener("submit", async function(event) {

    event.preventDefault();

    const email = document.getElementById("userEmail").value;
    const password = document.getElementById("userPassword").value;

    try {

        const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        const result = await response.json();

        if(response.ok){
            window.location.assign("/dashboard.html");
        } else {
            alert(result.error || "Login failed");
        }

    } catch(error) {
        alert("Unable to connect to server.");
    }
});
</script>

</body>
</html>
