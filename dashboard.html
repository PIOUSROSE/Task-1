<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f4f4;
        }

        .container {
            width: 60%;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .logout-btn {
            padding: 10px 20px;
            border: none;
            background-color: #d9534f;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }

        .logout-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Admin Dashboard</h1>

        <div id="admin-restricted-zone">
            <p>Authorized users can access admin features here.</p>
        </div>

        <br><br>

        <button class="logout-btn" onclick="logout()">
            Terminate Session (Logout)
        </button>
    </div>

    <script>
        function logout() {
            sessionStorage.clear();
            localStorage.clear();

            alert("Session terminated successfully.");

            window.location.href = "login.html";
        }
    </script>

</body>
</html>
